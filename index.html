function categorize(name) {
  const n = name.toLowerCase();
  // pick the longest (most specific) keyword match across all categories, so compound terms
  // like "קוביית מרק עוף" resolve to pantry rather than meat just because it contains "עוף"
  let best = null;
  for (const cat of ['produce','dairy','meat','pantry']) {
    for (const k of KEYWORDS[cat]) {
      if (n.includes(k) && (!best || k.length > best.k.length)) best = { k, cat };
    }
  }
  return best ? best.cat : 'other';
}

const ADJ_FOLLOWERS = ['ירוקה','ירוק','אדומה','אדום','לבנה','לבן','צהובה','צהוב','טרי','טרייה','יבש','יבשה','מתוקה','מתוק','חריפה','חריף','קפוא','קפואה'];
const HEBREW_PREFIX_LETTERS = ['ו','ה','ב','ל','מ','ש','כ'];

function stripHebrewPrefix(word, keyword) {
  let w = word;
  while (w.length > keyword.length && HEBREW_PREFIX_LETTERS.includes(w[0]) && w.slice(1).includes(keyword)) {
    w = w.slice(1);
  }
  return w;
}

// Finds all distinct ingredient mentions inside a longer chunk of text (e.g. an instruction
// sentence), pulling in adjacent connector words ("שיני שום") or descriptors ("שעועית ירוקה").
// Returns an array (possibly empty) rather than a single best guess, since sentences often
// enumerate several ingredients at once ("מוסיפים את הבצל, הגזר והסלרי").
function extractIngredientPhrases(text, removeVerbs) {
  let remainder = text;
  if (removeVerbs) INSTRUCTION_VERBS.forEach(v => { remainder = remainder.split(v).join(' '); });
  remainder = remainder.replace(/[.,:;!?()]/g, ' ').replace(/\s+/g, ' ').trim();
  if (!remainder) return [];

  const results = [];
  // Multi-word keywords first, matched against the whole remainder, then consumed so their
  // individual words don't also get picked up by the single-word pass below.
  for (const cat of ['produce','dairy','meat','pantry']) {
    for (const k of KEYWORDS[cat]) {
      if (k.includes(' ') && remainder.includes(k)) {
        results.push({ name: k, category: cat });
        remainder = remainder.split(k).join(' ');
      }
    }
  }

  const words = remainder.split(' ').filter(Boolean);
  const usedIndices = new Set();
  for (let i = 0; i < words.length; i++) {
    if (usedIndices.has(i)) continue;
    let best = null;
    for (const cat of ['produce','dairy','meat','pantry']) {
      for (const k of KEYWORDS[cat]) {
        if (k.includes(' ')) continue;
        if (words[i].includes(k) && (!best || k.length > best.k.length)) best = { k, cat };
      }
    }
    if (!best) continue;
    let name = stripHebrewPrefix(words[i], best.k);
    if (i > 0 && CONNECTOR_PRECEDERS.includes(words[i-1]) && !usedIndices.has(i-1)) { name = words[i-1] + ' ' + name; usedIndices.add(i-1); }
    if (i < words.length - 1 && ADJ_FOLLOWERS.includes(words[i+1])) { name = name + ' ' + words[i+1]; usedIndices.add(i+1); }
    usedIndices.add(i);
    if (name.length <= 25) results.push({ name, category: best.cat });
  }
  return results;
}

const UNIT_WORDS = ['כוסות','כוס','כפות','כף','כפיות','כפית','גרם',"ג'",'ג׳','קג','מ"ל','מ״ל','מל','ליטר','יחידות','יחידה','חבילות','חבילה','קורט','פרוסות','פרוסה','שיני','שן','חופן','קילו',"יח'"];
const AMOUNT_RE = /^([\d½¼¾⅓⅔.,\/]+\s*(?:כוסות|כוס|כפות|כף|כפיות|כפית|גרם|ג'|ג׳|קג|מ"ל|מ״ל|מל|ליטר|יחידות|יחידה|חבילות|חבילה|קורט|פרוסות|פרוסה|שיני|שן|חופן|קילו)?)\s+(.+)$/;
const EMOJI_HASH_RE = /#\S+|[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2B00}-\u{2BFF}]/gu;

function stripDecoration(line) {
  return line.replace(EMOJI_HASH_RE, '')
    .replace(/^[\-\*•●▪️\u2022]\s*/, '')
    .replace(/^\d{1,2}[\.\)]\s+/, '')
    .replace(/[:：]\s*$/, '')
    .trim();
}
function isSectionHeader(line) {
  const trimmedLine = line.trim();
  const bare = stripDecoration(trimmedLine);
  if (SECTION_HEADERS.some(h => bare === h)) return true;
  // A short "title:" line (a dish/component sub-header like "פתיתים:" or "שניצל טופו:")
  if (/[:：]\s*$/.test(trimmedLine) && bare.split(' ').length <= 4 && !AMOUNT_RE.test(bare)) return true;
  return false;
}
function isNoiseLine(line) {
  const bare = stripDecoration(line);
  if (bare.length < 2) return true;
  if (/^\(.*\)$/.test(bare)) return true;              // whole line is a parenthetical aside
  if (/^\d{1,2}:\d{2}$/.test(bare)) return true;        // clock time (status bar)
  if (/^\d+$/.test(bare)) return true;                  // bare number (battery %, like/comment counts)
  if (/^[a-z0-9_.]+$/i.test(bare) && /_/.test(bare)) return true; // @handle / username
  const lower = line.toLowerCase();
  if (NOISE_PATTERNS.some(p => lower.includes(p.toLowerCase()))) return true;
  const hasHebrew = /[\u0590-\u05FF]/.test(bare);
  if (!hasHebrew && !/\d/.test(bare)) return true;      // latin/symbol gibberish (icons, UI chrome)
  return false;
}

function mkItem(name, amount, category) {
  return { id: 'item-' + Date.now() + '-' + Math.random().toString(36).slice(2,7), name: name.trim(), amount: (amount||'').trim(), category, purchased: false };
}

function parseLineToItem(line) {
  const clean = stripDecoration(line);
  const m = clean.match(AMOUNT_RE);
  let amount = '', name = clean;
  if (m) { amount = m[1].trim(); name = m[2].trim(); }
  return mkItem(name, amount, categorize(name));
}

function classifyLine(rawLine, ingredients, instructions) {
  const line = rawLine.trim();
  if (!line || isNoiseLine(line) || isSectionHeader(line)) return;
  const cleaned = stripDecoration(line);
  if (!cleaned) return;
  const hasLeadingAmount = AMOUNT_RE.test(cleaned);
  const hasVerb = INSTRUCTION_VERBS.some(v => cleaned.includes(v));

  if (hasLeadingAmount) {
    ingredients.push(parseLineToItem(cleaned));
    return;
  }
  if (hasVerb && cleaned.length > 8) {
    instructions.push(cleaned.replace(/^\d+[\.\)]\s*/, ''));
    extractIngredientPhrases(cleaned, true).forEach(e => ingredients.push(mkItem(e.name, '', e.category)));
    return;
  }
  const wordCount = cleaned.split(/\s+/).filter(Boolean).length;
  if (wordCount > 4) {
    // No recognized quantity or cooking verb, but reads like a full sentence rather than a
    // product label - treat it as a preparation note, never as a shopping-list item.
    // Require a real amount of Hebrew content first, so OCR noise from UI chrome (usernames,
    // like/share counters, dates, garbled symbols) doesn't get treated as a cooking step.
    const hebrewLetterCount = (cleaned.match(/[\u0590-\u05FF]/g) || []).length;
    if ((/[.,]/.test(cleaned) || wordCount > 6) && hebrewLetterCount >= 8) {
      instructions.push(cleaned);
      extractIngredientPhrases(cleaned, true).forEach(e => ingredients.push(mkItem(e.name, '', e.category)));
    }
    return;
  }
  // A single long "word" with no spaces is often OCR garbage (e.g. a misread hashtag glued to
  // the next word, like "#בולונזאורז" -> "אבולונזאורז") that only coincidentally contains a
  // real keyword as a substring - reject it rather than adding a nonsense product name.
  if (wordCount === 1 && cleaned.length > 10) return;
  // Short line (<=4 words), no quantity, no verb: only accept it as a product if it clearly names a known food item
  const extractedList = extractIngredientPhrases(cleaned, false);
  if (extractedList.length === 1 && cleaned.length <= 22) {
    ingredients.push(mkItem(cleaned, '', extractedList[0].category));
  } else {
    extractedList.forEach(e => ingredients.push(mkItem(e.name, '', e.category)));
  }
}

const VARIETY_WORDS = ['ירוק','ירוקה','אדום','אדומה','לבן','לבנה','צהוב','צהובה'];

// The keyword (from KEYWORDS[category]) that actually identifies what this item is - used to
// recognize that "חבילת פטרוזיליה" and "פטרוזיליה קצוצה" are the same underlying product even
// though the surrounding words (packaging vs. prep-state) differ completely.
function coreKeywordOf(item) {
  const n = (item.name || '').toLowerCase();
  let best = null;
  for (const k of KEYWORDS[item.category] || []) {
    if (n.includes(k) && (!best || k.length > best.length)) best = k;
  }
  return best || n;
}

// Merges items that share the same core ingredient regardless of phrasing, keeping whichever
// version is most useful for a shopping list: an explicit amount first, then a packaging/count
// word (חבילת/שיני/קלחי...), then a real variety descriptor (color), then just the bare core name.
function mergeByCoreIngredient(items) {
  const groups = new Map();
  items.forEach(it => {
    const sig = it.category + '::' + coreKeywordOf(it);
    if (!groups.has(sig)) groups.set(sig, []);
    groups.get(sig).push(it);
  });
  const result = [];
  groups.forEach(group => {
    if (group.length === 1) { result.push(group[0]); return; }
    const withAmount = group.find(it => it.amount);
    if (withAmount) { result.push(withAmount); return; }
    const withConnector = group.find(it => CONNECTOR_PRECEDERS.some(c => it.name.includes(c)));
    if (withConnector) { result.push(withConnector); return; }
    const withVariety = group.find(it => VARIETY_WORDS.some(c => it.name.includes(c)));
    if (withVariety) { result.push(withVariety); return; }
    result.push(mkItem(coreKeywordOf(group[0]), '', group[0].category));
  });
  return result;
}

// Recipe captions and OCR both introduce line breaks at the visual wrap point, not at sentence
// boundaries - so a single instruction step often arrives as 2-3 separate lines. This joins
// those fragments back into complete sentences before classification, so the saved cooking
// guide reads like real steps instead of a pile of disconnected bullet fragments.
function consolidateWrappedLines(lines) {
  const result = [];
  let buffer = '';
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { if (buffer) { result.push(buffer); buffer = ''; } continue; }
    const startsNewStep = /^\d{1,2}[\.\)]\s/.test(line) || /^[\-\*•●▪️]/.test(line);
    if (buffer && startsNewStep) { result.push(buffer); buffer = ''; }
    buffer = buffer ? (buffer + ' ' + line) : line;
    if (/[.!?]['")]?\s*$/.test(line)) { result.push(buffer); buffer = ''; }
  }
  if (buffer) result.push(buffer);
  return result;
}

function extractFromText(text) {
  const trimmed = text.trim();
  const lines = trimmed.split('\n').map(l => l.trim()).filter(Boolean);

  // A single short line with no quantities/units and no comma-separated list structure is
  // almost certainly just a dish name (e.g. "פסטה רוזה" or "שניצל עוף"), not a pasted/scanned
  // ingredient list. Only in that case do we consult our local recipe library - otherwise a
  // real caption that merely *mentions* a dish name (e.g. "שניצל טופו" contains "שניצל") would
  // get hijacked by the wrong hardcoded recipe instead of being parsed for real.
  const totalWordCount = trimmed.split(/\s+/).filter(Boolean).length;
  const hasAnyDigitOrUnit = /\d/.test(trimmed) || UNIT_WORDS.some(u => trimmed.includes(u));
  const commaCount = (trimmed.match(/,/g) || []).length;
  const looksLikeBareDishName = lines.length <= 1 && totalWordCount <= 6 && !hasAnyDigitOrUnit && commaCount < 2;

  if (looksLikeBareDishName) {
    for (const mock of MOCK_RECIPES) {
      if (mock.match(trimmed)) {
        return {
          title: mock.title,
          items: mock.items.map(([amount, name, cat]) => mkItem(name, amount, cat)),
          instructions: mock.instructions.slice()
        };
      }
    }
    // Looks like a dish name but we don't have it locally - let the caller fall back to a real search
    return null;
  }

  const ingredients = [], instructions = [];
  const instructionsHeaderIdx = lines.findIndex(l => {
    const bare = stripDecoration(l).trim();
    return SECTION_HEADERS.some(h => bare === h && (h.includes('הכנה') || h.includes('אופן')));
  });
  if (instructionsHeaderIdx === -1) {
    lines.forEach(l => classifyLine(l, ingredients, instructions));
  } else {
    lines.slice(0, instructionsHeaderIdx + 1).forEach(l => classifyLine(l, ingredients, instructions));
    consolidateWrappedLines(lines.slice(instructionsHeaderIdx + 1)).forEach(l => classifyLine(l, ingredients, instructions));
  }
  const byName = new Map();
  ingredients.forEach(it => {
    const key = it.name.trim().toLowerCase();
    const existing = byName.get(key);
    if (!existing || (!existing.amount && it.amount)) byName.set(key, it);
  });
  // Second pass: merge substring-level near-duplicates (e.g. a bare "טופו" mentioned in an
  // instruction line vs "חבילת טופו" already captured from the ingredient list).
  let deduped = [...byName.values()];
  const merged = [];
  deduped.sort((a, b) => b.name.length - a.name.length); // longer/more descriptive names first
  deduped.forEach(it => {
    const norm = it.name.trim().toLowerCase();
    const already = merged.find(m => {
      const mNorm = m.name.trim().toLowerCase();
      return mNorm.includes(norm) || norm.includes(mNorm);
    });
    if (already) { if (!already.amount && it.amount) already.amount = it.amount; return; }
    merged.push(it);
  });
  // Third pass: merge remaining near-duplicates that share the same core ingredient but are
  // phrased completely differently (e.g. "חבילת פטרוזיליה" vs "פטרוזיליה קצוצה").
  const cleanIngredients = mergeByCoreIngredient(merged).filter(it => it.name && it.name.length < 60);
  if (cleanIngredients.length === 0) return null;

  const NARRATIVE_HINTS = ['נתקעתי','החלטתי','רציתי','התחשק','אילתרתי','קמתי','אני אוהב','אני אוהבת','בפעם האחרונה','השבוע'];
  const looksNarrative = (l) => NARRATIVE_HINTS.some(h => l.includes(h)) || /-\s*$/.test(l);
  let title = stripDecoration(lines[0]).trim();
  if (looksNarrative(lines[0]) && lines[1]) {
    const secondLine = stripDecoration(lines[1]).trim();
    if (secondLine && secondLine.length <= 40 && !looksNarrative(secondLine)) title = secondLine;
  }
  if (!title || title.length > 40 || /\d/.test(title)) title = 'מתכון שנוסף לאפליקציה';
  const cleanInstructions = [...new Set(instructions.map(s => s.trim()))].filter(Boolean);
  return { title, items: cleanIngredients, instructions: cleanInstructions };
}

/* ===================== IMAGE HELPERS ===================== */
function fileToDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function makeThumbnail(dataUrl, maxW) {
  return new Promise((res) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      res(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.onerror = () => res(null);
    img.src = dataUrl;
  });
}

/* ===================== STORAGE (works inside Claude.ai AND as a standalone page) ===================== */
const HAS_ARTIFACT_STORAGE = (typeof window.storage !== 'undefined') && window.storage && typeof window.storage.get === 'function';

async function storageGet(key) {
  if (HAS_ARTIFACT_STORAGE) {
    try { const r = await window.storage.get(key, false); return r ? r.value : null; } catch(e) { return null; }
  }
  try { return localStorage.getItem(key); } catch(e) { return null; }
}
async function storageSet(key, value) {
  if (HAS_ARTIFACT_STORAGE) {
    try { await window.storage.set(key, value, false); } catch(e) {}
    return;
  }
  try { localStorage.setItem(key, value); } catch(e) {}
}

async function loadState() {
  let shoppingList = [], recipes = [], apiKey = '';
  try { const v = await storageGet('shopping-list'); if (v) shoppingList = JSON.parse(v); } catch(e) {}
  try { const v = await storageGet('recipes'); if (v) recipes = JSON.parse(v); } catch(e) {}
  try { const v = await storageGet('anthropic-api-key'); if (v) apiKey = v; } catch(e) {}
  return { shoppingList, recipes, apiKey };
}
async function saveList() { await storageSet('shopping-list', JSON.stringify(state.shoppingList)); }
async function saveRecipes() { await storageSet('recipes', JSON.stringify(state.recipes)); }
async function saveApiKey(key) { await storageSet('anthropic-api-key', key || ''); }

function mergeIntoShoppingList(items) {
  let added = 0, skipped = 0;
  items.forEach(src => {
    const norm = src.name.trim().toLowerCase();
    const srcCore = coreKeywordOf(src);
    const exists = state.shoppingList.some(it => {
      if (it.purchased) return false;
      if (it.name.trim().toLowerCase() === norm) return true;
      return it.category === src.category && coreKeywordOf(it) === srcCore;
    });
    if (exists) { skipped++; return; }
    state.shoppingList.push(mkItem(src.name, src.amount, src.category));
    added++;
  });
  saveList();
  return { added, skipped };
}

/* ===================== MAIN RENDER ===================== */
function render() {
  const container = document.getElementById('app-content');
  let screenHtml = '';
  if (!state.ready) {
    screenHtml = `<div class="h-full flex flex-col items-center justify-center gap-3">
      <div class="text-4xl pot-bounce">🍲</div>
      <p class="text-muted text-sm">טוען את הרשימה שלך...</p>
    </div>`;
  } else if (state.activeTab === 'add') {
    screenHtml = renderScreenAdd();
  } else if (state.activeTab === 'list') {
    screenHtml = renderScreenList();
  } else {
    screenHtml = renderScreenRecipes();
  }
  container.innerHTML = `<div class="min-h-full relative">${screenHtml}${renderModal()}${renderSettingsModal()}</div>${renderToast()}`;
  renderNav();
  bindImageInput();
  if (window.lucide) lucide.createIcons();
}

/* ===================== ACTIONS: EXTRACT ===================== */
function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

function finalizeExtraction(result, thumbnail) {
  const recipeEntry = {
    id: 'r-' + Date.now(),
    title: result.title,
    date: fmtDate(new Date()),
    items: result.items.map(i => ({ name: i.name, amount: i.amount, category: i.category })),
    instructions: result.instructions || [],
    thumbnail: thumbnail || null,
    source: result.source || null
  };
  state.recipes.unshift(recipeEntry);
  saveRecipes();
  const { added, skipped } = mergeIntoShoppingList(result.items);
  state.lastResult = { recipeId: recipeEntry.id, title: result.title, items: result.items, instructions: result.instructions, added, skipped, source: result.source || null };
}

async function testApiKeyConnection(keyToTest) {
  state.testingKey = true;
  state.testResult = null;
  render();
  const headers = { 'Content-Type': 'application/json' };
  if (keyToTest) {
    headers['x-api-key'] = keyToTest;
    headers['anthropic-version'] = '2023-06-01';
    headers['anthropic-dangerous-direct-browser-access'] = 'true';
  }
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers,
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 16, messages: [{ role: 'user', content: 'הגב במילה אחת: תקין' }] })
    });
    const data = await resp.json();
    if (resp.status === 401 || resp.status === 403) {
      state.testResult = { ok: false, message: keyToTest ? '❌ המפתח לא תקין או שאין לו הרשאה (401/403)' : '❌ אין חיבור אוטומטי כאן — נדרש מפתח API' };
    } else if (data && data.type === 'error') {
      state.testResult = { ok: false, message: `❌ שגיאה מה-API: ${(data.error && data.error.message) || 'לא ידועה'}` };
    } else if (resp.ok && data && data.content) {
      state.testResult = { ok: true, message: '✅ החיבור תקין! החיפוש באינטרנט אמור לעבוד' };
    } else {
      state.testResult = { ok: false, message: `❌ תשובה לא צפויה (סטטוס ${resp.status})` };
    }
  } catch (err) {
    state.testResult = { ok: false, message: '❌ החיבור נחסם ברשת (CORS/רשת) — בדקו הגדרות רשת או נסו דפדפן אחר' };
  }
  state.testingKey = false;
  render();
}

const HAS_HEBREW_RE = /[\u0590-\u05FF]/;

// MyMemory - free, keyless, CORS-enabled translation API. Used as a bridge so the free
// MealDB recipe search (English-only) can also work for Hebrew dish names, with no signup at all.
async function translateText(text, from, to) {
  if (!text || !text.trim()) return text;
  try {
    const resp = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
    const data = await resp.json();
    const translated = data && data.responseData && data.responseData.translatedText;
    if (!translated) return text;
    if (/MYMEMORY WARNING|QUOTA|INVALID/i.test(translated)) return text;
    return translated;
  } catch (e) { return text; }
}

async function searchMealDB(query) {
  // TheMealDB free public API - no key, no cost, no signup. Its index is English-only.
  let data;
  try {
    const resp = await fetch('https://www.themealdb.com/api/json/v1/1/search.php?s=' + encodeURIComponent(query));
    data = await resp.json();
  } catch (e) { return null; }
  if (!data || !Array.isArray(data.meals) || data.meals.length === 0) return null;
  const meal = data.meals[0];
  const rawItems = [];
  for (let i = 1; i <= 20; i++) {
    const name = (meal['strIngredient' + i] || '').trim();
    const measure = (meal['strMeasure' + i] || '').trim();
    if (!name) continue;
    rawItems.push({ name, measure });
  }
  if (rawItems.length === 0) return null;
  const rawInstructions = (meal.strInstructions || '')
    .split(/\r?\n|(?<=\.)\s+/).map(s => s.trim()).filter(s => s.length > 3).slice(0, 12);
  return { title: meal.strMeal || query, rawItems, rawInstructions };
}

// Free, keyless recipe search that works for Hebrew input too: translates Hebrew -> English,
// searches the free MealDB, then translates the result back to Hebrew.
async function searchFreeRecipe(query) {
  const isHebrew = HAS_HEBREW_RE.test(query);
  const englishQuery = isHebrew ? await translateText(query, 'he', 'en') : query;
  const found = await searchMealDB(englishQuery);
  if (!found) return null;

  if (!isHebrew) {
    const items = found.rawItems.map(i => mkItem(i.name, i.measure, categorize(i.name)));
    return { title: found.title, items, instructions: found.rawInstructions, source: 'mealdb' };
  }

  // Translate everything back to Hebrew in parallel to keep it fast
  const [titleHe, namesHe, instructionsHe] = await Promise.all([
    translateText(found.title, 'en', 'he'),
    Promise.all(found.rawItems.map(i => translateText(i.name, 'en', 'he'))),
    Promise.all(found.rawInstructions.map(s => translateText(s, 'en', 'he')))
  ]);
  const items = found.rawItems.map((i, idx) => mkItem(namesHe[idx] || i.name, i.measure, categorize(namesHe[idx] || i.name)));
  return { title: titleHe || found.title, items, instructions: instructionsHe, source: 'mealdb' };
}

async function searchRecipeOnline(query) {
  const system = 'את/ה עוזר שמוצא מתכוני בישול אמיתיים באמצעות חיפוש אחד קצר באינטרנט. חפש את המתכון המתאים ביותר לבקשת המשתמש (שם מנה, תיאור, או כיתוב חלקי). התשובה הסופית שלך חייבת להיות אך ורק אובייקט JSON יחיד ותקין, בעברית, בלי שום טקסט לפני או אחרי, בלי markdown, קצר וממוקד (עד 12 מרכיבים, עד 6 שלבי הכנה קצרים), בפורמט המדויק הזה: {"title":"שם המתכון","ingredients":[{"amount":"2 כוסות","name":"קמח"}],"instructions":["שלב קצר","שלב קצר"]}. אם לא נמצא מתכון מתאים, החזר {"error":"לא נמצא מתכון מתאים"} ותו לא.';
  const headers = { 'Content-Type': 'application/json' };
  if (state.apiKey) {
    headers['x-api-key'] = state.apiKey;
    headers['anthropic-version'] = '2023-06-01';
    headers['anthropic-dangerous-direct-browser-access'] = 'true';
  }
  let resp, data;
  try {
    resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system,
        messages: [{ role: 'user', content: `מצא מתכון עבור: "${query}"` }],
        tools: [{ type: 'web_search_20250305', name: 'web_search' }]
      })
    });
    data = await resp.json();
  } catch (networkErr) {
    console.error('Recipe search network error:', networkErr);
    throw new Error('NETWORK_ERROR');
  }
  if (resp.status === 401 || resp.status === 403) {
    console.error('Recipe search auth error:', data);
    throw new Error('AUTH_REQUIRED');
  }
  if (data && data.type === 'error') {
    console.error('Recipe search API error:', data.error);
    throw new Error((data.error && data.error.message) || 'API error');
  }
  const fullText = (data.content || []).map(b => b.type === 'text' ? b.text : '').filter(Boolean).join('\n');
  const jsonMatch = fullText.match(/\{[\s\S]*\}/);
  if (!jsonMatch) {
    console.error('Recipe search: no JSON found in response:', fullText);
    throw new Error('No JSON in response');
  }
  let parsed;
  try { parsed = JSON.parse(jsonMatch[0]); }
  catch (parseErr) { console.error('Recipe search: JSON parse failed:', jsonMatch[0]); throw parseErr; }
  if (!parsed || parsed.error || !Array.isArray(parsed.ingredients) || parsed.ingredients.length === 0) return null;
  const items = parsed.ingredients.map(i => mkItem(i.name || '', i.amount || '', categorize(i.name || ''))).filter(it => it.name);
  if (items.length === 0) return null;
  return { title: parsed.title || query, items, instructions: Array.isArray(parsed.instructions) ? parsed.instructions : [], source: 'web' };
}

async function startExtract() {
  const ta = document.getElementById('recipe-textarea');
  const text = ta ? ta.value : '';
  if (!text.trim()) { showToast('אנא הדביקו טקסט מתכון קודם', 'error'); return; }
  state.recipeText = text;
  state.loading = true;
  state.loadingLabel = 'מפרק את המתכון למרכיבים...';
  state.lastResult = null;
  render();
  await sleep(1500);
  let result = extractFromText(state.recipeText);
  let searchError = null;
  if (!result) {
    if (state.apiKey || HAS_ARTIFACT_STORAGE) {
      state.loadingLabel = 'לא זוהו מצרכים בטקסט — מחפש מתכון מתאים באינטרנט...';
      render();
      try { result = await searchRecipeOnline(state.recipeText); }
      catch (e) { console.error('Online recipe search failed:', e); searchError = e.message; result = null; }
    }
    if (!result) {
      state.loadingLabel = 'מחפש במאגר מתכונים חינמי (כולל תרגום אוטומטי)...';
      render();
      try { result = await searchFreeRecipe(state.recipeText); } catch (e) { /* silent - this is a best-effort free fallback */ }
    }
  }
  state.loading = false;
  if (!result) {
    if (searchError === 'AUTH_REQUIRED' && !HAS_ARTIFACT_STORAGE) {
      showToast('החיפוש המלא בעברית דורש מפתח API חינמי בהגדרות (⚙️) — נסו גם לכתוב את שם המנה באנגלית', 'error');
    } else if (searchError === 'NETWORK_ERROR') {
      showToast('בעיית רשת בחיפוש המתכון. בדקו את החיבור ונסו שוב', 'error');
    } else {
      showToast('לא נמצא מתכון. נסו לכתוב את שם המנה גם באנגלית, או הדביקו את הטקסט המלא עם המצרכים', 'error');
    }
    render();
    return;
  }
  finalizeExtraction(result, null);
  state.recipeText = '';
  render();
}

function preprocessImageForOCR(file) {
  // Grayscale + contrast boost tends to noticeably improve Tesseract's accuracy on
  // real-world phone screenshots (translucent overlays, low-contrast UI backgrounds, etc).
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1600;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const imageData = ctx.getImageData(0, 0, w, h);
      const d = imageData.data;
      const contrast = 1.35;
      for (let i = 0; i < d.length; i += 4) {
        const gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
        const adjusted = Math.min(255, Math.max(0, (gray - 128) * contrast + 128));
        d[i] = d[i+1] = d[i+2] = adjusted;
      }
      ctx.putImageData(imageData, 0, 0);
      canvas.toBlob((blob) => resolve(blob || file), 'image/png');
    };
    img.onerror = () => resolve(file);
    img.src = URL.createObjectURL(file);
  });
}

async function runOCR() {
  if (typeof Tesseract === 'undefined') {
    showToast('מנוע הסריקה לא נטען. בדקו את חיבור הרשת או הדביקו טקסט', 'error');
    return;
  }
  const images = state.pendingImages || [];
  if (images.length === 0) return;
  state.loading = true;
  state.ocrProgress = 0;
  render();

  const texts = [];
  try {
    for (let i = 0; i < images.length; i++) {
      state.ocrLabel = images.length > 1 ? `סורק תמונה ${i + 1} מתוך ${images.length}...` : 'סורק את התמונה...';
      render();
      const processed = await preprocessImageForOCR(images[i].file);
      const { data: { text } } = await Tesseract.recognize(processed, 'heb+eng', {
        logger: (m) => {
          if (m.status === 'recognizing text') {
            const pctThisImage = Math.round((m.progress || 0) * 100);
            const overallPct = Math.round(((i + (m.progress || 0)) / images.length) * 100);
            const bar = document.getElementById('ocr-progress-bar');
            const label = document.getElementById('ocr-progress-text');
            if (bar) bar.style.width = overallPct + '%';
            if (label) label.textContent = overallPct + '%' + (images.length > 1 ? ` (תמונה ${i + 1}/${images.length})` : '');
          }
        }
      });
      texts.push(text);
    }
    const combinedText = texts.join('\n');
    const result = extractFromText(combinedText);
    state.loading = false;
    if (!result) {
      showToast('לא הצלחנו לזהות מצרכים בתמונות. נסו תמונות ברורות יותר או הדביקו טקסט', 'error');
      state.pendingImages = [];
      render();
      return;
    }
    finalizeExtraction(result, images[0].thumb);
    state.pendingImages = [];
    render();
  } catch (err) {
    console.error('OCR failed:', err);
    state.loading = false;
    showToast('הסריקה נכשלה. נסו תמונה אחרת או הדביקו טקסט', 'error');
    render();
  }
}

/* ===================== ACTIONS: MISC ===================== */
function handleAddQuickItem() {
  const input = document.getElementById('quick-add-input');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  const category = categorize(val);
  state.shoppingList.push(mkItem(val, '', category));
  saveList();
  render();
  const newInput = document.getElementById('quick-add-input');
  if (newInput) newInput.focus();
}

function bindImageInput() {
  const inp = document.getElementById('image-file-input');
  if (!inp || inp._bound) return;
  inp._bound = true;
  inp.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    for (const file of files) {
      const dataUrl = await fileToDataURL(file);
      const thumb = await makeThumbnail(dataUrl, 400);
      state.pendingImages.push({ file, thumb });
    }
    render();
  });
}

function handleClick(e) {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  if (action === 'switch-tab') { state.activeTab = target.dataset.tab; render(); }
  else if (action === 'open-settings') { state.showSettings = true; render(); }
  else if (action === 'close-settings') { state.showSettings = false; render(); }
  else if (action === 'save-api-key') {
    const inp = document.getElementById('api-key-input');
    const val = inp ? inp.value.trim() : '';
    state.apiKey = val;
    saveApiKey(val);
    state.showSettings = false;
    showToast(val ? 'המפתח נשמר' : 'לא הוזן מפתח');
  }
  else if (action === 'clear-api-key') {
    state.apiKey = '';
    saveApiKey('');
    state.showSettings = false;
    showToast('המפתח הוסר');
  }
  else if (action === 'test-api-key') {
    const inp = document.getElementById('api-key-input');
    const keyToTest = inp ? inp.value.trim() : '';
    testApiKeyConnection(keyToTest);
  }
  else if (action === 'switch-add-mode') { state.addMode = target.dataset.mode; render(); }
  else if (action === 'extract') startExtract();
  else if (action === 'fill-example') {
    const key = target.dataset.example;
    const ta = document.getElementById('recipe-textarea');
    if (ta) { ta.value = SAMPLE_CAPTIONS[key]; state.recipeText = SAMPLE_CAPTIONS[key]; ta.focus(); }
  }
  else if (action === 'trigger-file-input') { const inp = document.getElementById('image-file-input'); if (inp) inp.click(); }
  else if (action === 'remove-image') { state.pendingImages.splice(Number(target.dataset.index), 1); render(); }
  else if (action === 'run-ocr') runOCR();
  else if (action === 'goto-list-from-result') { state.activeTab = 'list'; state.lastResult = null; render(); }
  else if (action === 'new-recipe') { state.lastResult = null; state.recipeText = ''; render(); }
  else if (action === 'toggle-item') {
    const it = state.shoppingList.find(i => i.id === target.dataset.id);
    if (it) { it.purchased = !it.purchased; saveList(); render(); }
  }
  else if (action === 'open-delete-item-modal') {
    const it = state.shoppingList.find(i => i.id === target.dataset.id);
    if (!it) return;
    state.confirmModal = { message: `להסיר את "${it.name}" מרשימת הקניות?`, action: 'deleteItem', payload: it.id };
    render();
  }
  else if (action === 'add-quick-item') handleAddQuickItem();
  else if (action === 'open-clear-list-modal') {
    if (state.shoppingList.length === 0) return;
    state.confirmModal = { message: 'לרוקן את כל רשימת הקניות?', action: 'clearList' };
    render();
  }
  else if (action === 'open-delete-recipe-modal') {
    state.confirmModal = { message: 'למחוק את המתכון מההיסטוריה?', action: 'deleteRecipe', payload: target.dataset.id };
    render();
  }
  else if (action === 'close-modal') { state.confirmModal = null; render(); }
  else if (action === 'confirm-modal') {
    const modal = state.confirmModal;
    if (modal.action === 'clearList') { state.shoppingList = []; saveList(); showToast('הרשימה נוקתה'); }
    else if (modal.action === 'deleteItem') { state.shoppingList = state.shoppingList.filter(i => i.id !== modal.payload); saveList(); showToast('המוצר הוסר מהרשימה'); }
    else if (modal.action === 'deleteRecipe') {
      state.recipes = state.recipes.filter(r => r.id !== modal.payload);
      saveRecipes();
      if (state.lastResult && state.lastResult.recipeId === modal.payload) state.lastResult = null;
      showToast('המתכון נמחק');
    }
    state.confirmModal = null;
    render();
  }
  else if (action === 'toggle-recipe-expand') { state.expandedRecipeId = state.expandedRecipeId === target.dataset.id ? null : target.dataset.id; render(); }
  else if (action === 'start-edit-recipe') { state.editingRecipeId = target.dataset.id; render(); const inp = document.getElementById('edit-recipe-title-input'); if (inp) { inp.focus(); inp.select(); } }
  else if (action === 'cancel-edit-recipe') { state.editingRecipeId = null; render(); }
  else if (action === 'save-edit-recipe') {
    const inp = document.getElementById('edit-recipe-title-input');
    const val = inp ? inp.value.trim() : '';
    const recipe = state.recipes.find(r => r.id === target.dataset.id);
    if (recipe && val) { recipe.title = val; saveRecipes(); if (state.lastResult && state.lastResult.recipeId === recipe.id) state.lastResult.title = val; }
    state.editingRecipeId = null;
    render();
  }
  else if (action === 'add-recipe-to-list') {
    const recipe = state.recipes.find(r => r.id === target.dataset.id);
    if (recipe) {
      const { added, skipped } = mergeIntoShoppingList(recipe.items);
      showToast(added ? `${added} מוצרים נוספו לרשימה${skipped ? ` (${skipped} כבר היו קיימים)` : ''}` : 'כל המוצרים כבר נמצאים ברשימה');
      render();
    }
  }
}

function handleKeydown(e) {
  if (e.key === 'Enter' && e.target && e.target.id === 'quick-add-input') { e.preventDefault(); handleAddQuickItem(); }
  if (e.key === 'Enter' && e.target && e.target.id === 'edit-recipe-title-input') {
    e.preventDefault();
    const id = state.editingRecipeId;
    const val = e.target.value.trim();
    const recipe = state.recipes.find(r => r.id === id);
    if (recipe && val) { recipe.title = val; saveRecipes(); if (state.lastResult && state.lastResult.recipeId === recipe.id) state.lastResult.title = val; }
    state.editingRecipeId = null;
    render();
  }
}

/* ===================== INIT ===================== */
document.getElementById('app-frame').addEventListener('click', handleClick);
document.getElementById('app-frame').addEventListener('keydown', handleKeydown);

(async function init() {
  const splashStart = Date.now();
  render();
  const loaded = await loadState();
  state.shoppingList = loaded.shoppingList;
  state.recipes = loaded.recipes;
  state.apiKey = loaded.apiKey || '';
  state.ready = true;
  render();

  const MIN_SPLASH_MS = 1300;
  const elapsed = Date.now() - splashStart;
  if (elapsed < MIN_SPLASH_MS) await sleep(MIN_SPLASH_MS - elapsed);
  const splashEl = document.getElementById('splash-screen');
  if (splashEl) {
    splashEl.classList.add('splash-hide');
    setTimeout(() => splashEl.remove(), 550);
  }
})();
</script>
